<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Grupo 3</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
    
    body{
    height:100vh;
    background: linear-gradient(135deg,#141e30,#243b55);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: Arial, Helvetica, sans-serif;
}

/* Tarjeta */
.login-box{
    background:white;
    padding:40px;
    border-radius:20px;
    width:420px;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
    animation: aparecer 0.8s ease;
}

/* Animación */
@keyframes aparecer{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Iconos dentro del input */
.input-group-text{
    background:#243b55;
    color:white;
    border:none;
}

/* Botón */
.btn-login{
    background:#243b55;
    color:white;
    font-weight:bold;
    transition:0.3s;
}

.btn-login:hover{
    background:#141e30;
    transform:scale(1.03);
}

a{
    text-decoration:none;
}


</style>

</head>

<body>

<div class="login-box">

    <div class="imput-group mb-3">
        <h2 class="fw-bold">Bienvenido</h2>
        <p class="text-muted">Inicia sesión en tu cuenta</p>
    </div>

    <form action="../Login/login.php" method="POST" autocomplete="on">

       
        <div class="input-group mb-3">
            <span class="input-group-text">
                <i class="fa-solid fa-user"></i>
            </span>
            <input type="text"
                   name="user"
                   class="form-control"
                   placeholder="Usuario"
                   required>
        </div>

       
        <div>
            <span >
                <i></i>
            </span>
            <input type="password"
                   name="pass"
                   class="form-control"
                   placeholder="Contraseña"
                   required>
        </div>

       
        <div class="">
            <button type="submit"
                    name="entrar"
                    class="btn btn-login">
                <i class="fa-solid fa-right-to-bracket"></i>
                Entrar
            </button>
        </div>

       
        <div class="text-center">
            <small>¿No tienes cuenta?</small><br>
            <a href="../partials/formulario_crear.php" class="fw-bold">
                Crear una cuenta
            </a>
        </div>

    </form>

</div>
